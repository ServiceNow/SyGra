  model_type: azure_openai
  model: gpt-5.4
  api_version: 2025-04-01-preview
  parameters:
    temperature: 1.0
    max_completion_tokens: 128000

# R2 no-GT recalibrated prompt ablation (same model, 0.5-default no-GT config)
