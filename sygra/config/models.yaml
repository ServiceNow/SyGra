  model_type: vllm
  model_serving_name: qwen3_32b
  hf_chat_template_model_id: Qwen/Qwen3-32B
  parameters:
    max_tokens: 30000
    temperature: 0

claude_large_nogt_05:
  model_type: claude_proxy
  client_type: http
  backend: proxy
  ssl_verify: false
  extra_headers:
    x-now-request-metadata: '{"x_allow_routing": "global", "solution_name": "SyGra", "instance_name": "sygra"}'
    X-SNC-INTEGRATION-SOURCE: sygra
    trace_id: sygra-bfcl-eval
  parameters:
    maxOutputTokens: 8000
    temperature: 0

reranker_gemini_nogt_05:
  model_type: gemini_proxy
  client_type: http
  backend: proxy
  ssl_verify: false
  extra_headers:
    x-now-request-metadata: '{"x_allow_routing": "global", "solution_name": "SyGra", "instance_name": "sygra"}'
